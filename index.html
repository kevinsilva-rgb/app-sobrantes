<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Captura de Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bg-profundo: #0f172a; --bg-tarjeta: #1e293b; --bordes: #334155; --texto-claro: #f8fafc; --texto-muted: #94a3b8; --acento-azul: #38bdf8; }
    body { background-color: var(--bg-profundo); color: var(--texto-claro); padding-top: 30px; padding-bottom: 50px; }
    .container { max-width: 95%; background-color: var(--bg-tarjeta); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid var(--bordes); margin: 0 auto; }
    h2 { color: var(--texto-claro); font-weight: 600; }
    .nav-tabs { border-bottom: 1px solid var(--bordes); margin-bottom: 20px; }
    .nav-tabs .nav-link { color: var(--texto-muted); font-weight: 500; border: none; border-bottom: 2px solid transparent; }
    .nav-tabs .nav-link.active { background-color: transparent; color: var(--acento-azul); border-bottom: 2px solid var(--acento-azul); }
    .form-control { background-color: var(--bg-profundo); color: var(--texto-claro); border: 1px solid var(--bordes); }
    .form-control:focus { border-color: var(--acento-azul); box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25); }
    .alert-info { background-color: #0c4a6e; color: #bae6fd; border: 1px solid #0284c7; }
    .btn-outline-primary { color: var(--acento-azul); border-color: var(--acento-azul); }
    .btn-outline-info { color: #7dd3fc; border-color: #7dd3fc; }
    .table { color: var(--texto-claro); border-color: var(--bordes); font-size: 0.9rem; table-layout: auto; }
    .table td { word-break: break-word; } 
    .table-dark th { background-color: #020617; color: var(--acento-azul); border-color: var(--bordes); font-weight: 600; white-space: nowrap; }
    .opciones-carga { border: 1px dashed var(--acento-azul); border-radius: 8px; padding: 20px; background-color: rgba(56, 189, 248, 0.05); }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center mb-4">Sistema de Captura de Productos Sobrantes</h2>
  
  <ul class="nav nav-tabs" id="myTab" role="tablist">
    <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#excel" type="button" role="tab">Ingresar Productos 🚀</button></li>
    <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#consulta" type="button" role="tab">Consultar Reportes 🔍</button></li>
  </ul>
  
  <div class="tab-content">
    <div class="tab-pane fade show active" id="excel" role="tabpanel">
      <button type="button" class="btn btn-outline-primary mb-4 w-100" onclick="descargarPlantilla()">⬇️ Descargar Plantilla (CSV)</button>
      <form id="formExcel" onsubmit="enviarExcel(event)">
        <div class="row mb-4">
          <div class="col-md-6"><label class="form-label fw-bold">Responsable Chedraui:</label><input type="text" id="responsableCH" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label fw-bold">Recibe el producto:</label><input type="text" id="recibeProducto" class="form-control" required></div>
        </div>
        <div class="opciones-carga mb-4">
          <h6 class="text-info mb-3">Elige un método para ingresar los datos:</h6>
          <label class="form-label text-muted">Opción 1: Pega las filas desde tu Excel</label>
          <textarea id="textoPegado" class="form-control mb-3" rows="4"></textarea>
          <div class="text-center text-muted fw-bold mb-3">- O -</div>
          <label class="form-label text-muted">Opción 2: Sube el archivo CSV</label>
          <input type="file" id="archivoCSV" class="form-control" accept=".csv">
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold" style="color: #f87171;">📸 Evidencia de entrega (Obligatorio):</label>
          <input type="file" id="imagenEvidencia" class="form-control" accept="image/*" required>
        </div>
        <button type="submit" id="btnGuardar" class="btn btn-success w-100">Procesar y Guardar Todo</button>
      </form>
    </div>

    <div class="tab-pane fade" id="consulta" role="tabpanel">
      <form id="formConsulta" onsubmit="realizarConsulta(event)" class="mt-3">
        <div class="row mb-3">
          <div class="col-md-4"><label class="form-label" style="color: var(--texto-muted);">Tienda (opcional)</label><input type="text" id="filtroTienda" class="form-control"></div>
          <div class="col-md-3"><label class="form-label" style="color: var(--texto-muted);">Albarán (opcional)</label><input type="text" id="filtroAlbaran" class="form-control"></div>
          <div class="col-md-3"><label class="form-label" style="color: var(--texto-muted);">Fecha (opcional)</label><input type="date" id="filtroFecha" class="form-control"></div>
          <div class="col-md-2 d-flex align-items-end"><button type="submit" class="btn btn-primary w-100" style="background-color: var(--acento-azul); color: #000; border: none;">Buscar</button></div>
        </div>
      </form>
      <div class="d-flex justify-content-end mb-2"><button type="button" class="btn btn-outline-info btn-sm" id="btnDescargarConsulta" onclick="descargarConsultaCSV()" style="display: none;">⬇️ Descargar Resultados</button></div>
      <div class="table-responsive">
        <table class="table table-striped table-bordered table-sm text-center align-middle">
          <thead class="table-dark">
            <tr><th>Fecha y Hora</th><th>Resp. Chedraui</th><th>Recibe</th><th>Tienda</th><th>Código</th><th>Albarán</th><th>SKU</th><th>EAN</th><th>Producto</th><th>Cant.</th><th>Evidencia</th><th>Cargado</th></tr>
          </thead>
          <tbody id="cuerpoTablaResultados"><tr><td colspan="12" class="text-muted py-3">Usa los filtros de arriba...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="status" class="mt-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // --------------------------------------------------------
  // ¡PEGAR AQUÍ LA URL DE TU APLICACIÓN WEB DE GOOGLE!
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4g0x3uA2YJ0frjPL2JbXH32I90vgcE6JWlZEyoLHibnnb36UZ-j1VEHXoTK9fZZgf/exec"; 
  // --------------------------------------------------------

  var ultimosResultados = []; 

  function mostrarAlerta(mensaje, esError = false) {
    var statusDiv = document.getElementById("status");
    statusDiv.innerHTML = `<div class="alert ${esError ? "alert-danger" : "alert-success"} text-center" role="alert" style="border: none;">${mensaje}</div>`;
  }

  function enviarExcel(e) {
    e.preventDefault();
    var btn = document.getElementById("btnGuardar");
    btn.disabled = true; 
    
    var responsable = document.getElementById("responsableCH").value;
    var recibe = document.getElementById("recibeProducto").value;
    var textoPaste = document.getElementById("textoPegado").value;
    var archivoCSV = document.getElementById("archivoCSV").files[0];
    var archivoEvidencia = document.getElementById("imagenEvidencia").files[0];
    
    if (!textoPaste.trim() && !archivoCSV) { mostrarAlerta("Por favor, pega los datos o sube el archivo CSV.", true); btn.disabled = false; return; }
    if (!archivoEvidencia) { mostrarAlerta("Adjunta una foto de evidencia. Es obligatorio.", true); btn.disabled = false; return; }
    
    mostrarAlerta("Procesando datos hacia Google...", false);
    
    if (archivoCSV) {
      var readerCSV = new FileReader();
      readerCSV.onload = function(eventoCSV) {
        var lineas = eventoCSV.target.result.replace(/\r/g, '').split('\n');
        if (lineas.length > 0 && lineas[0].toLowerCase().includes("tienda")) lineas.shift();
        var textoConvertido = lineas.map(linea => linea.split(';').join('\t')).join('\n');
        procesarImagenYEnviar(textoConvertido, archivoEvidencia, responsable, recibe);
      };
      readerCSV.readAsText(archivoCSV, 'UTF-8');
    } else {
      procesarImagenYEnviar(textoPaste, archivoEvidencia, responsable, recibe);
    }
  }

  function procesarImagenYEnviar(textoDatos, archivoImagen, responsable, recibe) {
    var readerImg = new FileReader();
    readerImg.onload = function(eventoImg) {
      var base64 = eventoImg.target.result.split(',')[1];
      var payload = {
        accion: "guardar",
        texto: textoDatos,
        imagen: { nombre: archivoImagen.name, tipo: archivoImagen.type, base64: base64 },
        infoExtra: { responsable: responsable, recibe: recibe }
      };
      hacerPeticionGoogle(payload, function() { document.getElementById("formExcel").reset(); }, btnGuardar);
    };
    readerImg.readAsDataURL(archivoImagen);
  }

  function realizarConsulta(e) {
    e.preventDefault();
    document.getElementById("cuerpoTablaResultados").innerHTML = '<tr><td colspan="12" class="py-3" style="color: var(--texto-muted);">Cargando...</td></tr>';
    var payload = {
      accion: "buscar",
      filtro: {
        tienda: document.getElementById("filtroTienda").value,
        albaran: document.getElementById("filtroAlbaran").value,
        fecha: document.getElementById("filtroFecha").value
      }
    };
    hacerPeticionGoogle(payload, mostrarResultados);
  }

  // --- EL NUEVO MOTOR DE CONEXIÓN CON GOOGLE ---
  function hacerPeticionGoogle(payload, callbackExito, botonActivar = null) {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Truco para evitar bloqueo CORS
      body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === "exito") {
        mostrarAlerta(data.mensaje || "Operación exitosa", false);
        if(callbackExito) callbackExito(data.datos);
      } else {
        mostrarAlerta("Error del servidor: " + data.mensaje, true);
      }
      if (botonActivar) botonActivar.disabled = false;
    })
    .catch(error => {
      mostrarAlerta("Error de red o conexión: " + error.message, true);
      if (botonActivar) botonActivar.disabled = false;
    });
  }

  function mostrarResultados(resultados) {
    ultimosResultados = resultados || []; 
    var tbody = document.getElementById("cuerpoTablaResultados");
    var btnDescargar = document.getElementById("btnDescargarConsulta");
    tbody.innerHTML = ""; 
    
    if (ultimosResultados.length === 0) {
      tbody.innerHTML = '<tr><td colspan="12" class="py-3" style="color: var(--texto-muted);">No se encontraron registros.</td></tr>';
      btnDescargar.style.display = "none";
      return;
    }
    
    btnDescargar.style.display = "block"; 
    ultimosResultados.forEach(fila => {
      var tr = document.createElement("tr");
      for (var j = 0; j < 12; j++) {
        var td = document.createElement("td");
        if (j === 10) { 
          td.innerHTML = fila[j] && fila[j].toString().startsWith("http") ? `<a href="${fila[j]}" target="_blank" class="btn btn-sm" style="border: 1px solid var(--acento-azul); color: var(--acento-azul);">Ver</a>` : "-";
        } else if (j === 11) { 
          var estado = fila[j] ? fila[j].toString().trim().toUpperCase() : "";
          td.innerHTML = estado === "SI" ? `<span class="badge bg-success">SI</span>` : (estado === "NO" ? `<span class="badge bg-danger">NO</span>` : estado);
        } else {
          td.textContent = fila[j] !== undefined ? fila[j] : ""; 
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    });
  }

  function descargarPlantilla() {
    var link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob(["\uFEFFTienda;Código Tienda;Núm. Albarán;SKU;EAN;Nombre del Producto;Cantidad\n"], { type: 'text/csv;charset=utf-8;' }));
    link.download = "Plantilla_Captura_Productos.csv";
    link.click();
  }

  function descargarConsultaCSV() {
    var csvContent = "\uFEFFFecha y Hora;Responsable CH;Recibe;Tienda;Código Tienda;Núm. Albarán;SKU;EAN;Nombre del Producto;Cantidad;Evidencia;Cargado\n";
    ultimosResultados.forEach(fila => {
      csvContent += fila.map(dato => (dato || "").toString().replace(/;/g, ",").replace(/\n/g, " ")).join(";") + "\n";
    });
    var link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
    link.download = "Consulta_Sobrantes_" + new Date().toISOString().slice(0, 10) + ".csv";
    link.click();
  }
</script>
</body>
</html>
